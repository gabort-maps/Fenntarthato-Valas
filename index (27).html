<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fenntartható Válás · Launch Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f1ea; --card:#fbfaf6; --ink:#1f2d2b; --ink-soft:#566461;
    --line:#e2ddd1; --line-strong:#cfc8b8;
    --sage:#3f6f63; --sage-deep:#2c4f47; --sage-tint:#e4ede9;
    --red:#b6452f; --red-tint:#f6e1da; --amber:#b9821f; --amber-tint:#f6ecd6;
    --green:#3f7d54; --green-tint:#e1ede4; --blue:#3a6285; --blue-tint:#e0e9f1;
    --gray:#8a8577; --gray-tint:#ebe8df;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased}
  body{background-image:radial-gradient(rgba(63,111,99,.04) 1px,transparent 1px);background-size:22px 22px}
  .font-display{font-family:'Fraunces',serif}
  ::-webkit-scrollbar{height:9px;width:9px}
  ::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}
  select,input{font-family:inherit}
  .tabnum{font-variant-numeric:tabular-nums}
  .ring-focus:focus{outline:none;box-shadow:0 0 0 3px var(--sage-tint)}

  /* --- layout utilities (replacing Tailwind CDN) --- */
  .flex{display:flex}
  .grid{display:grid}
  .flex-wrap{flex-wrap:wrap}
  .flex-col{flex-direction:column}
  .items-center{align-items:center}
  .items-start{align-items:flex-start}
  .items-end{align-items:flex-end}
  .justify-between{justify-content:space-between}
  .ml-auto{margin-left:auto}
  .hidden{display:none}
  .gap-1{gap:4px}
  .gap-2{gap:8px}
  .gap-3{gap:12px}
  .gap-4{gap:16px}
  .gap-5{gap:20px}
  .gap-x-4{column-gap:16px}
  .gap-y-1{row-gap:4px}
  .space-y-3 > * + *{margin-top:12px}
  .space-y-6 > * + *{margin-top:24px}
  .space-y-7 > * + *{margin-top:28px}
  @media (min-width:768px){ .md\:grid{display:grid} }
</style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
